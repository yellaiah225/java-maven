name: Manual workflow

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Person to greet'
        default: 'World'
        required: true
        type: string

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Send greeting
        run: echo "Hello ${{ inputs.name }}"

  # a → b
  docker-publish:
    needs: greet
    uses: ./.github/workflows/docker-publish.yml
    with:
      build_tag: "manual-trigger"

  # a → c
  new-workflow:
    needs: greet
    uses: ./.github/workflows/new.yaml
    with:
      example_input: "manual-trigger"

  # b → d
  testing:
    needs: docker-publish
    uses: ./.github/workflows/testing.yaml
    with:
      name: "manual-trigger"

  # e → c
  jira:
    needs: greet
    uses: ./.github/workflows/jira.yaml
    with:
      build_tag: "manual-trigger"

  new-from-jira:
    needs: jira
    uses: ./.github/workflows/new.yaml
    with:
      example_input: "jira-trigger"
