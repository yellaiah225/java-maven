name: Manual workflow
 
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Person to greet'
        default: 'World'
        required: true
        type: string

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Send greeting
        run: echo "Hello ${{ inputs.name }}"

  # Step A → B
  call-docker:
    needs: greet
    uses: ./.github/workflows/docker-publish.yml
    with:
      build_tag: "manual-trigger"

  # Step A → C
  call-new:
    needs: greet
    uses: ./.github/workflows/new.yaml
    with:
      example_input: "manual-trigger"

  # Step B → D
  call-test:
    needs: call-docker
    uses: ./.github/workflows/testing.yaml
    with:
      name: "manual-trigger"
