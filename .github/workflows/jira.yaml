name: Jira workflow

on:
  workflow_call:
    inputs:
      build_tag:
        description: "Optional tag for Jira job"
        required: false
        type: string

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Send greeting
        run: echo "Hello ${{ inputs.name }}"



  # E → C
  call-new:
    needs: greet
    uses: ./.github/workflows/new.yaml
    with:
      example_input: "manual-trigger"

