name: Docker

on:
  workflow_call:
    inputs:
      build_tag:
        description: "Optional tag for Docker build"
        required: false
        type: string
  push:
    branches: [ "master" ]
    tags: [ 'v*.*.*' ]
  schedule:
    - cron: '18 18 * * *'
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: echo "Building Docker image with tag ${{ inputs.build_tag }}"
